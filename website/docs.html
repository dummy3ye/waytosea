    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const viewer = document.getElementById('markdown-viewer');
        const tocList = document.getElementById('toc-list');
        const sidebarLinks = document.querySelectorAll('.sidebar-nav-link');
        const DOCS_BASE_PATH = 'docs/';

        const renderer = new marked.Renderer();

        renderer.heading = function (args) {
          const text = args.text || '';
          const level = args.depth || 1;
          const slug = text
            .toLowerCase()
            .replace(/[^\w]+/g, '-')
            .replace(/^-+|-+$/g, '');
          return `<h${level} id="${slug}">${text}</h${level}>`;
        };

        marked.setOptions({
          renderer: renderer,
          highlight: function (code, lang) {
            const language = hljs.getLanguage(lang) ? lang : 'plaintext';
            return hljs.highlight(code, { language }).value;
          },
          langPrefix: 'hljs language-',
          gfm: true,
          breaks: true,
        });

        function generateTOC() {
          tocList.innerHTML = '';
          const headings = viewer.querySelectorAll('h2, h3');

          if (headings.length === 0) {
            tocList.innerHTML =
              '<li class="toc-item"><span class="toc-link">No sections</span></li>';
            return;
          }

          headings.forEach((heading) => {
            const li = document.createElement('li');
            li.className = 'toc-item';
            if (heading.tagName === 'H3') {
              li.style.paddingLeft = '1rem';
            }

            const a = document.createElement('a');
            a.className = 'toc-link';
            a.href = `#${heading.id}`;
            a.textContent = heading.textContent;

            li.appendChild(a);
            tocList.appendChild(li);
          });
        }

        function loadMarkdown(filename) {
          viewer.innerHTML = '<p>Loading documentation...</p>';
          fetch(`${DOCS_BASE_PATH}${filename}.md`)
            .then((response) => {
              if (!response.ok) throw new Error('File not found');
              return response.text();
            })
            .then((text) => {
              viewer.innerHTML = marked.parse(text);

              viewer.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
              });

              generateTOC();

              sidebarLinks.forEach((link) => {
                if (link.dataset.file === filename) {
                  link.classList.add('active');
                } else {
                  link.classList.remove('active');
                }
              });

              window.scrollTo(0, 0);
            })
            .catch((err) => {
              viewer.innerHTML = `
                <div class="error-state">
                  <h2>Documentation not found</h2>
                  <p>Could not load <strong>${filename}.md</strong>. Error: ${err.message}</p>
                </div>`;
            });
        }

        sidebarLinks.forEach((link) => {
          link.addEventListener('click', (e) => {
            e.preventDefault();
            const filename = link.dataset.file;
            window.history.pushState({}, '', `?file=${filename}`);
            loadMarkdown(filename);
          });
        });

        window.addEventListener('popstate', () => {
          const params = new URLSearchParams(window.location.search);
          loadMarkdown(params.get('file') || 'README');
        });

        const urlParams = new URLSearchParams(window.location.search);
        const initialFile = urlParams.get('file') || 'README';
        loadMarkdown(initialFile);

        window.addEventListener('scroll', () => {
          const headings = viewer.querySelectorAll('h2, h3');
          let activeId = '';

          headings.forEach((heading) => {
            const top = heading.getBoundingClientRect().top;
            if (top < 100) {
              activeId = heading.id;
            }
          });

          document.querySelectorAll('.toc-link').forEach((link) => {
            if (link.getAttribute('href') === `#${activeId}`) {
              link.classList.add('active');
            } else {
              link.classList.remove('active');
            }
          });
        });
      });
    </script>
